[package]
name = "crap-cms"
version = "0.1.0"
edition = "2021"
default-run = "crap-cms"

[[bin]]
name = "crap-cms"
path = "src/main.rs"

[dependencies]
# Web framework
axum = { version = "0.8", features = ["form", "macros", "query", "multipart"] }
tower-http = { version = "0.6", features = ["fs"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }

# Database
rusqlite = { version = "0.38", features = ["bundled"] }
r2d2 = "0.8"
r2d2_sqlite = "0.32"

# Templates
handlebars = { version = "6", features = ["dir_source"] }
include_dir = "0.7"

# gRPC
tonic = "0.14"
tonic-prost = "0.14"
prost = "0.14"
prost-types = "0.14"
tonic-reflection = "0.14"
tokio-stream = { version = "0.1", features = ["sync"] }

# Lua
mlua = { version = "0.11", features = ["lua54", "vendored", "serialize", "send"] }

# Config & CLI
clap = { version = "4", features = ["derive"] }
dialoguer = "0.11"
toml = "1.0"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Auth
argon2 = "0.5"
jsonwebtoken = "9"

# Email
lettre = { version = "0.11", default-features = false, features = ["tokio1-rustls-tls", "builder", "smtp-transport"] }

# Image processing
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "webp", "avif"] }
webp = "0.3"

# HTTP client (blocking — used in Lua spawn_blocking context)
ureq = "2"

# Crypto
ring = "0.17"
base64 = "0.22"
rand = "0.8"
aes-gcm = "0.10"

# Utilities
rpassword = "5"
nanoid = "0.4"
dirs = "6"
chrono = { version = "0.4", features = ["serde"] }
mime_guess = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"

[profile.dev.package.image]
opt-level = 2
[profile.dev.package.webp]
opt-level = 2

[build-dependencies]
tonic-prost-build = "0.14"

[profile.release]
lto = true
codegen-units = 1
