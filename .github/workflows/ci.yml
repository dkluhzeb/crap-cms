name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-registry-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install Biome
        run: |
          curl -fsSL "https://github.com/biomejs/biome/releases/download/cli%2Fv2.3.15/biome-linux-x64" -o /usr/local/bin/biome
          chmod +x /usr/local/bin/biome
          biome --version

      - name: Biome (JS + CSS format + lint)
        run: biome ci

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Handlebars template formatting (crap-cms fmt)
        run: cargo run --quiet --bin crap-cms -- fmt --check

      - name: Security audit (cargo audit)
        run: |
          cargo install --locked cargo-audit --version "^0.22"
          cargo audit

      - name: Run tests
        run: cargo test --workspace

  features:
    name: feature matrix (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # sqlite + postgres — the most common multi-backend deployment.
          - label: sqlite+postgres
            flags: --features postgres
            test: true
          # postgres only — surfaces accidental sqlite-isms leaking through
          # the DbConnection abstraction.
          - label: postgres-only
            flags: --no-default-features --features postgres
            test: false
          # all features — catches feature-interaction compile errors across
          # s3-storage, redis, browser-tests, and both backends. Compile-only;
          # browser-tests needs Chrome at runtime and runs in the dedicated
          # `e2e` job below.
          - label: all-features
            flags: --all-features
            test: false
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-registry-

      - name: Build
        run: cargo build ${{ matrix.flags }}

      - name: Clippy
        run: cargo clippy ${{ matrix.flags }} --all-targets -- -D warnings

      - name: Test
        if: matrix.test
        run: cargo test ${{ matrix.flags }} --workspace

  e2e:
    name: e2e (browser tests)
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-registry-

      # chromiumoxide finds Chrome via PATH; setup-chrome puts the
      # `chrome` binary on PATH and prints its path for debug output.
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run browser e2e tests
        run: cargo test --test e2e --features browser-tests
