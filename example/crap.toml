[server]
admin_port = 3000
grpc_port = 50051
host = "0.0.0.0"

[database]
path = "data/crap.db"
# pool_max_size = 32

[admin]
dev_mode = false
default_timezone = "America/New_York"

[auth]
# secret auto-generated on first start
token_expiry = 7200

[depth]
default_depth = 1
max_depth = 10

[upload]
max_file_size = "50MB"

[email]
smtp_host = "${CRAP_SMTP_HOST:-}"
smtp_port = 587
smtp_user = "${CRAP_SMTP_USER:-}"
smtp_pass = "${CRAP_SMTP_PASS:-}"
smtp_tls = "${CRAP_SMTP_TLS:-starttls}"
from_address = "${CRAP_SMTP_FROM:-noreply@crap.studio}"
from_name = "Crap Studio"

[live]
enabled = true

[locale]
default_locale = "en"
locales = ["en", "de"]
fallback = true

[jobs]
poll_interval = 5

[pagination]
# default_limit = 20
# max_limit = 1000
mode = "cursor"

[cors]
allowed_origins = ["http://localhost:3000", "http://localhost:5173"]
allowed_methods = ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
allowed_headers = ["Content-Type", "Authorization"]
max_age = "1h"

[access]
# default_deny = false

[logging]
file = true
# path = "data/logs"
# rotation = "daily"
# max_files = 30

[hooks]
on_init = ["hooks.on_init"]
vm_pool_size = 16
