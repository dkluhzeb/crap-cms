[server]
admin_port = 3000
grpc_port = 50051
host = "0.0.0.0"

[database]
path = "data/crap.db"
pool_max_size = 64

[admin]
dev_mode = false

[auth]
# secret auto-generated on first start
token_expiry = 7200

[depth]
default_depth = 1
max_depth = 10

[upload]
max_file_size = "50MB"

[email]
# smtp_host = ""  # Set via CRAP_SMTP_HOST env var to enable
# smtp_port = 587
# smtp_username = ""
# smtp_password = ""
# from_address = "noreply@meridian.studio"
# from_name = "Meridian Studio"

[live]
enabled = true

[locale]
default_locale = "en"
locales = ["en", "de"]
fallback = true

[jobs]
enabled = true
poll_interval = 5

[pagination]
# default_limit = 20
# max_limit = 1000
mode = "cursor"

[cors]
allowed_origins = ["http://localhost:3000", "http://localhost:5173"]
allowed_methods = ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
allowed_headers = ["Content-Type", "Authorization"]
max_age = 3600

[access]
# default_read = "access.authenticated"

[hooks]
on_init = ["hooks.on_init"]
vm_pool_size = 16

[meridian]
studio_name = "Meridian Studio"
max_budget = 500000
inquiry_webhook_url = "https://hooks.example.com/inquiries"
